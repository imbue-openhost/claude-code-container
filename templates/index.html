<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>claude-workbench</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <style>
    html, body { margin: 0; height: 100%; background: #1e1e1e; color: #ddd;
      font-family: -apple-system, system-ui, sans-serif; }
    body { display: flex; flex-direction: column; }
    #tabs { display: flex; background: #111; border-bottom: 1px solid #333;
      align-items: stretch; min-height: 32px; user-select: none; }
    .tab { display: flex; align-items: center; padding: 4px 8px 4px 12px;
      border-right: 1px solid #333; cursor: pointer; font-size: 13px; color: #aaa; }
    .tab.active { background: #1e1e1e; color: #fff; }
    .tab .close { margin-left: 8px; padding: 0 4px; opacity: 0.6; }
    .tab .close:hover { opacity: 1; color: #f55; }
    #new-tab { padding: 4px 12px; cursor: pointer; color: #888; font-size: 16px;
      align-self: center; }
    #new-tab:hover { color: #fff; }
    #panes { flex: 1; position: relative; }
    .pane { position: absolute; inset: 0; display: none; padding: 4px; box-sizing: border-box; }
    .pane.active { display: block; }
    .pane > .term { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="tabs">
    <div id="new-tab" title="New terminal">+</div>
  </div>
  <div id="panes"></div>
  <script src="/static/app.js"></script>
</body>
</html>
