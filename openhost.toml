[app]
name = "claude-workbench"
version = "0.1.0"
description = "Tabbed terminals preloaded with Claude Code and a cloned openhost repo, for building and debugging openhost apps."

[runtime.container]
image = "Dockerfile"
port = 5000

[routing]
health_check = "/health"

[resources]
memory_mb = 1024
cpu_millicores = 1000

# claude-workbench is the first provider of the open-workspace service: a valid
# repo + ref redirects the user into a checkout of that repo at that commit.
# The contract lives in this repo under services/open-workspace/.
[[services.v2.provides]]
service = "github.com/imbue-openhost/claude-code-container/services/open-workspace"
version = "0.1.0"
endpoint = "/open-workspace"

# Pull ANTHROPIC_API_KEY from the secrets app if it's installed. The fetch is
# best-effort — if secrets-v2 isn't around or the key isn't set, the terminal
# still works and the user can `claude login` or export the key by hand.
[[services.v2.consumes]]
service = "github.com/imbue-openhost/openhost/services/secrets"
shortname = "secrets"
version = ">=0.1.0"
grants = [
    {key = "ANTHROPIC_API_KEY"},
    {key = "OH_HOSTNAME"},
    {key = "OH_TOKEN"},
]

# Mint a transient GitHub token so open-workspace can clone private repos that
# openhost has access to (same OAuth flow openhost uses). Best-effort — public
# repos clone without it, and if no grant exists the clone falls back to
# unauthenticated.
[[services.v2.consumes]]
service = "github.com/imbue-openhost/openhost/services/oauth"
shortname = "oauth"
version = ">=0.1.0"
grants = [
    {provider = "github", scopes = ["repo"]},
]
